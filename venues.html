<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeff Rogers — Where I've Played</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --garnet:#73000A;
  --garnet-dim:rgba(115,0,10,0.15);
  --gold:#C9A84C;
  --dark:#0F0D0A;
  --dark2:#1A1714;
  --cream:#F5EFE0;
  --cream2:#EDE4CC;
  --muted:#9A8E7A;
  --ff:'Playfair Display',serif;
  --fb:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{
  background:var(--dark);
  color:var(--cream);
  font-family:var(--fb);
  overflow-x:hidden;
}

/* ── PAGE HERO ── */
.page-hero{
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(115,0,10,0.12) 0%, transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 80px,rgba(201,168,76,0.025) 80px,rgba(201,168,76,0.025) 81px);
}
.page-hero-rule{width:60px;height:1px;background:var(--gold);margin:0 auto 1.5rem;position:relative;z-index:1}
.page-hero-eyebrow{
  font-family:var(--fb);font-size:0.75rem;letter-spacing:0.35em;
  text-transform:uppercase;color:var(--gold);
  margin-bottom:1.2rem;position:relative;z-index:1;
}
.page-hero h1{
  font-family:var(--ff);font-size:clamp(3rem,8vw,7rem);
  font-weight:700;line-height:1.0;
  position:relative;z-index:1;
}
.page-hero h1 em{font-style:italic;color:var(--gold)}
.page-hero p{
  font-size:1.05rem;color:var(--muted);max-width:460px;
  line-height:1.7;margin:1.5rem auto 0;position:relative;z-index:1;
}
.scroll-hint{
  position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:0.5rem;
}
.scroll-hint::after{
  content:'';width:1px;height:40px;background:var(--gold);opacity:0.4;
  animation:pulse-line 1.8s ease-in-out infinite;
}
@keyframes pulse-line{0%,100%{opacity:0.1;transform:scaleY(0.4)}50%{opacity:0.5;transform:scaleY(1)}}

/* ── CATEGORY SECTIONS ── */
.cat-section{
  position:relative;
  min-height:100vh;
}

/* Sticky header band — starts invisible, becomes visible via JS */
.cat-sticky{
  position:sticky;
  top:0;
  z-index:50;
  height:72px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(15,13,10,0.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(201,168,76,0.2);
  /* hidden until scrolled-in */
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.cat-sticky.visible{opacity:1;pointer-events:auto}
.cat-sticky-inner{
  display:flex;align-items:center;gap:0.75rem;
}
.cat-sticky-icon{font-size:1.1rem}
.cat-sticky-title{
  font-family:var(--ff);font-size:1.25rem;font-weight:700;color:var(--cream);
}
.cat-sticky-count{
  font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--muted);margin-left:0.25rem;
}

/* Big centered heading — the theatrical intro */
.cat-intro{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
  padding:6rem 2rem;
  text-align:center;
  position:relative;
  /* Pulled up behind sticky so sticky overlays it on scroll */
  margin-top:-72px;
  padding-top:calc(6rem + 72px);
}
.cat-intro-icon{
  font-size:3rem;margin-bottom:1.5rem;
  animation:float-icon 3s ease-in-out infinite;
}
@keyframes float-icon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.cat-intro-eyebrow{
  font-size:0.72rem;letter-spacing:0.35em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1rem;
}
.cat-intro h2{
  font-family:var(--ff);
  font-size:clamp(2.8rem,7vw,6rem);
  font-weight:700;line-height:1.05;
  color:var(--cream);
  margin-bottom:1.2rem;
}
.cat-intro h2 em{font-style:italic;color:var(--gold)}
.cat-intro-sub{
  font-size:1rem;color:var(--muted);max-width:440px;line-height:1.7;
  margin-bottom:3rem;
}
.cat-intro-scroll{
  font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:0.5rem;
}
.cat-intro-scroll::after{
  content:'';width:1px;height:32px;background:var(--gold);opacity:0.4;
  animation:pulse-line 1.8s ease-in-out infinite;
}

/* Logo grid */
.logo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:1px;
  background:rgba(201,168,76,0.1);
  border-top:1px solid rgba(201,168,76,0.15);
  border-bottom:1px solid rgba(201,168,76,0.15);
  padding:0;
}
.logo-cell{
  background:var(--dark2);
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1.5rem;
  min-height:140px;
  transition:background 0.25s, transform 0.25s;
  overflow:hidden;
}
.logo-cell:hover{
  background:#252119;
  z-index:2;
  transform:scale(1.03);
}
.logo-cell img{
  max-width:140px;max-height:90px;
  width:auto;height:auto;
  display:block;
  opacity:0.85;
  transition:opacity 0.25s, transform 0.25s;
}
.logo-cell:hover img{
  opacity:1;
}

/* Section divider */
.section-divider{
  height:1px;background:var(--garnet-dim);
  margin:0;
}

/* ── FOOTER ── */
footer{
  text-align:center;padding:3rem 2rem;
  background:var(--dark);
  border-top:1px solid rgba(201,168,76,0.15);
}
.footer-copy{font-size:0.78rem;color:var(--muted)}

/* ── SCROLL ANIMATIONS ── */
.reveal{
  opacity:0;transform:translateY(32px);
  transition:opacity 0.7s ease, transform 0.7s ease;
}
.reveal.in-view{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav style="position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;background:linear-gradient(to bottom,rgba(15,13,10,0.95) 0%,rgba(15,13,10,0) 100%);pointer-events:none">
  <a href="index.html" style="pointer-events:auto;display:flex;align-items:center;gap:0.6rem;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--cream);opacity:0.8;transition:opacity 0.2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Jeff Rogers
  </a>
  <span style="font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);opacity:0.7">Where I've Played</span>
</nav>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="page-hero-rule"></div>
  <p class="page-hero-eyebrow">Charlotte &amp; Surrounding Area</p>
  <h1>Where I&rsquo;ve<br><em>Played</em></h1>
  <p>From elegant country clubs to lively wine bars and unforgettable wedding nights &mdash; here&rsquo;s a look at the venues that have welcomed live music.</p>
  <div class="scroll-hint">Scroll</div>
</section>

<div id="sections-wrap"></div>

<footer>
  <p class="footer-copy">&copy; 2025 Jeff Rogers &bull; Charlotte, NC</p>
</footer>

<script>
const LOGOS = {
  "Golf & Country Clubs": [
    "logos/golf-country-clubs/logo_00.png",
    "logos/golf-country-clubs/logo_01.jpg",
    "logos/golf-country-clubs/logo_02.png",
    "logos/golf-country-clubs/logo_03.png",
    "logos/golf-country-clubs/logo_04.jpg",
    "logos/golf-country-clubs/logo_05.jpg",
    "logos/golf-country-clubs/logo_06.jpg",
  ],
  "Bars & Restaurants": [
    "logos/bars-restaurants/logo_07.jpg",
    "logos/bars-restaurants/logo_08.png",
    "logos/bars-restaurants/logo_09.jpg",
    "logos/bars-restaurants/logo_10.jpg",
    "logos/bars-restaurants/logo_11.jpg",
    "logos/bars-restaurants/logo_12.jpg",
    "logos/bars-restaurants/logo_13.png",
    "logos/bars-restaurants/logo_14.png",
    "logos/bars-restaurants/logo_15.png",
    "logos/bars-restaurants/logo_16.png",
    "logos/bars-restaurants/logo_17.png",
    "logos/bars-restaurants/logo_18.jpg",
    "logos/bars-restaurants/logo_19.png",
    "logos/bars-restaurants/logo_20.jpg",
    "logos/bars-restaurants/logo_22.png",
    "logos/bars-restaurants/logo_23.png",
    "logos/bars-restaurants/logo_24.png",
  ],
  "Wedding & Event Venues": [
    "logos/wedding-event-venues/logo_21.png",
    "logos/wedding-event-venues/logo_25.png",
    "logos/wedding-event-venues/logo_26.png",
    "logos/wedding-event-venues/logo_27.jpg",
    "logos/wedding-event-venues/logo_28.png",
    "logos/wedding-event-venues/logo_29.png",
  ],
};

const CATS = [
  {
    key: 'Golf & Country Clubs',
    icon: '⛳',
    eyebrow: 'Private & Member Clubs',
    heading: 'Golf &amp; Country<br><em>Clubs</em>',
    sub: 'Where members expect the best &mdash; dining rooms, event spaces, and outdoor pavilions across the greater Charlotte area.',
  },
  {
    key: 'Bars & Restaurants',
    icon: '🍷',
    eyebrow: 'Dining & Nightlife',
    heading: 'Bars &amp;<br><em>Restaurants</em>',
    sub: 'From wine bars to upscale dining rooms, live music that keeps the energy right and the guests lingering.',
  },
  {
    key: 'Wedding & Event Venues',
    icon: '💐',
    eyebrow: 'Celebrations & Ceremonies',
    heading: 'Wedding &amp;<br><em>Events</em>',
    sub: 'Cocktail hours, receptions, and private celebrations &mdash; the soundtrack to moments that matter.',
  },
];

const wrap = document.getElementById('sections-wrap');

CATS.forEach((cat, ci) => {
  const imgs = LOGOS[cat.key] || [];
  const count = imgs.length;

  // Build section HTML
  const sec = document.createElement('section');
  sec.className = 'cat-section';
  sec.dataset.cat = ci;

  // Sticky bar
  const sticky = document.createElement('div');
  sticky.className = 'cat-sticky';
  sticky.id = `sticky-${ci}`;
  sticky.innerHTML = `
    <div class="cat-sticky-inner">
      <span class="cat-sticky-icon">${cat.icon}</span>
      <span class="cat-sticky-title">${cat.key}</span>
      <span class="cat-sticky-count">${count} venues</span>
    </div>`;

  // Big intro
  const intro = document.createElement('div');
  intro.className = 'cat-intro reveal';
  intro.innerHTML = `
    <div class="cat-intro-icon">${cat.icon}</div>
    <p class="cat-intro-eyebrow">${cat.eyebrow}</p>
    <h2>${cat.heading}</h2>
    <p class="cat-intro-sub">${cat.sub}</p>
    <div class="cat-intro-scroll">Scroll to explore</div>`;

  // Logo grid
  const grid = document.createElement('div');
  grid.className = 'logo-grid';
  imgs.forEach((src, li) => {
    const cell = document.createElement('div');
    cell.className = 'logo-cell';
    cell.style.transitionDelay = `${(li % 6) * 60}ms`;
    cell.innerHTML = `<img src="${src}" alt="venue logo ${li+1}">`;
    grid.appendChild(cell);
  });

  sec.appendChild(sticky);
  sec.appendChild(intro);
  sec.appendChild(grid);

  if (ci < CATS.length - 1) {
    const div = document.createElement('div');
    div.className = 'section-divider';
    sec.appendChild(div);
  }

  wrap.appendChild(sec);
});

// Intersection observer for reveal animations
const revealObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('in-view');
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

// Sticky header visibility — show when intro scrolls past top
const stickyObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const ci = e.target.closest('[data-cat]').dataset.cat;
    const sticky = document.getElementById(`sticky-${ci}`);
    // intro leaving viewport top = show sticky
    if (!e.isIntersecting && e.boundingClientRect.top < 0) {
      sticky.classList.add('visible');
    } else {
      sticky.classList.remove('visible');
    }
  });
}, { threshold: 0, rootMargin: '-72px 0px 0px 0px' });

document.querySelectorAll('.cat-intro').forEach(el => stickyObs.observe(el));
</script>
</body>
</html>
